name: Build Windows App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: codex-app/package-lock.json

      - name: Install Dependencies
        working-directory: codex-app
        run: npm ci --ignore-scripts

      - name: Prepare Build Tooling
        working-directory: codex-app
        run: npm rebuild esbuild

      - name: Build Windows Executable
        working-directory: codex-app
        run: npm run build:win

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: CODEX-Windows-Installer
          if-no-files-found: error
          path: |
            codex-app/release/*.exe
            codex-app/release/*.blockmap
            codex-app/release/latest.yml
